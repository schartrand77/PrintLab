services:
  printlab:
    container_name: printlab
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HA_BAMBULAB_REF: main
    image: printlab-standalone:local
    restart: unless-stopped
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PRINTERS_JSON: ${PRINTERS_JSON:-}
      PRINTER_NAME: ${PRINTER_NAME:-}
      PRINTER_HOST: ${PRINTER_HOST:-}
      PRINTER_SERIAL: ${PRINTER_SERIAL:-}
      PRINTER_ACCESS_CODE: ${PRINTER_ACCESS_CODE:-}
      PRINTER_DEVICE_TYPE: ${PRINTER_DEVICE_TYPE:-unknown}
      PRINTER_LOCAL_MQTT: ${PRINTER_LOCAL_MQTT:-true}
      PRINTER_ENABLE_CAMERA: ${PRINTER_ENABLE_CAMERA:-true}
      PRINTER_DISABLE_SSL_VERIFY: ${PRINTER_DISABLE_SSL_VERIFY:-false}
      USER_LANGUAGE: ${USER_LANGUAGE:-en}
      FILE_CACHE_PATH: ${FILE_CACHE_PATH:-/data/cache}
      PRINT_CACHE_COUNT: ${PRINT_CACHE_COUNT:-1}
      TIMELAPSE_CACHE_COUNT: ${TIMELAPSE_CACHE_COUNT:-0}
      USAGE_HOURS: ${USAGE_HOURS:-0}
      FORCE_IP: ${FORCE_IP:-false}
      BAMBU_REGION: ${BAMBU_REGION:-}
      BAMBU_EMAIL: ${BAMBU_EMAIL:-}
      BAMBU_USERNAME: ${BAMBU_USERNAME:-}
      BAMBU_AUTH_TOKEN: ${BAMBU_AUTH_TOKEN:-}
      REQUIRE_AUTH: ${REQUIRE_AUTH:-true}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-1800}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      MAKERWORKS_BASE_URL: ${MAKERWORKS_BASE_URL:-}
      MAKERWORKS_API_KEY: ${MAKERWORKS_API_KEY:-}
      MAKERWORKS_BEARER_TOKEN: ${MAKERWORKS_BEARER_TOKEN:-}
      MAKERWORKS_AUTH_HEADER: ${MAKERWORKS_AUTH_HEADER:-X-API-Key}
      MAKERWORKS_VERIFY_SSL: ${MAKERWORKS_VERIFY_SSL:-true}
      MAKERWORKS_WEBHOOK_SECRET: ${MAKERWORKS_WEBHOOK_SECRET:-}
      MAKERWORKS_SUBMIT_API_KEY: ${MAKERWORKS_SUBMIT_API_KEY:-}
      MAKERWORKS_SUBMIT_BEARER_TOKEN: ${MAKERWORKS_SUBMIT_BEARER_TOKEN:-}
      MAKERWORKS_SUBMIT_AUTH_HEADER: ${MAKERWORKS_SUBMIT_AUTH_HEADER:-X-API-Key}
      MAKERWORKS_ALLOWED_PATHS: ${MAKERWORKS_ALLOWED_PATHS:-/health,/api/models}
      MAKERWORKS_ALLOWED_METHODS: ${MAKERWORKS_ALLOWED_METHODS:-}
      MAKERWORKS_LIBRARY_LIST_PATH: ${MAKERWORKS_LIBRARY_LIST_PATH:-/api/models}
      MAKERWORKS_LIBRARY_DETAIL_PATH_TEMPLATE: ${MAKERWORKS_LIBRARY_DETAIL_PATH_TEMPLATE:-/api/models/{model_id}}
      MAKERWORKS_LIBRARY_SEARCH_PARAM: ${MAKERWORKS_LIBRARY_SEARCH_PARAM:-q}
      MAKERWORKS_LIBRARY_PAGE_PARAM: ${MAKERWORKS_LIBRARY_PAGE_PARAM:-page}
      MAKERWORKS_LIBRARY_PAGE_SIZE_PARAM: ${MAKERWORKS_LIBRARY_PAGE_SIZE_PARAM:-page_size}
      MAKERWORKS_LIBRARY_PAGE_SIZE: ${MAKERWORKS_LIBRARY_PAGE_SIZE:-24}
      MAKERWORKS_LIBRARY_ITEMS_PATH: ${MAKERWORKS_LIBRARY_ITEMS_PATH:-models|items|data.items|results}
      MAKERWORKS_LIBRARY_TOTAL_PATH: ${MAKERWORKS_LIBRARY_TOTAL_PATH:-total|count|meta.total}
      MAKERWORKS_LIBRARY_ID_PATH: ${MAKERWORKS_LIBRARY_ID_PATH:-id|model_id|slug}
      MAKERWORKS_LIBRARY_NAME_PATH: ${MAKERWORKS_LIBRARY_NAME_PATH:-title|name}
      MAKERWORKS_LIBRARY_SUMMARY_PATH: ${MAKERWORKS_LIBRARY_SUMMARY_PATH:-summary|subtitle|excerpt|tagline|material}
      MAKERWORKS_LIBRARY_DESCRIPTION_PATH: ${MAKERWORKS_LIBRARY_DESCRIPTION_PATH:-description|details|content}
      MAKERWORKS_LIBRARY_THUMBNAIL_PATH: ${MAKERWORKS_LIBRARY_THUMBNAIL_PATH:-coverImagePath|thumbnail_url|thumbnail|thumbnail.url|cover.url|image.url|preview_url}
      MAKERWORKS_LIBRARY_MODEL_URL_PATH: ${MAKERWORKS_LIBRARY_MODEL_URL_PATH:-href|url|model_url|links.self|links.web}
      MAKERWORKS_LIBRARY_DOWNLOAD_URL_PATH: ${MAKERWORKS_LIBRARY_DOWNLOAD_URL_PATH:-filePath|download_url|files.0.download_url|files.0.url|assets.0.download_url|assets.0.url|viewerFilePath}
      MAKERWORKS_LIBRARY_AUTHOR_PATH: ${MAKERWORKS_LIBRARY_AUTHOR_PATH:-creditName|author.name|author.display_name|author|owner.name|owner.display_name}
      MAKERWORKS_LIBRARY_TAGS_PATH: ${MAKERWORKS_LIBRARY_TAGS_PATH:-tags|categories|labels}
      MAKERWORKS_LIBRARY_FILES_PATH: ${MAKERWORKS_LIBRARY_FILES_PATH:-files|assets}
      MAKERWORKS_LIBRARY_CREATED_AT_PATH: ${MAKERWORKS_LIBRARY_CREATED_AT_PATH:-created_at|createdAt|published_at}
      MAKERWORKS_LIBRARY_UPDATED_AT_PATH: ${MAKERWORKS_LIBRARY_UPDATED_AT_PATH:-updated_at|updatedAt|modified_at}
      MAKERWORKS_ATTACH_GCODE_ENABLED: ${MAKERWORKS_ATTACH_GCODE_ENABLED:-false}
      MAKERWORKS_ATTACH_GCODE_METHOD: ${MAKERWORKS_ATTACH_GCODE_METHOD:-POST}
      MAKERWORKS_ATTACH_GCODE_PATH_TEMPLATE: ${MAKERWORKS_ATTACH_GCODE_PATH_TEMPLATE:-}
      ORDERWORKS_BASE_URL: ${ORDERWORKS_BASE_URL:-}
      ORDERWORKS_API_KEY: ${ORDERWORKS_API_KEY:-}
      ORDERWORKS_BEARER_TOKEN: ${ORDERWORKS_BEARER_TOKEN:-}
      ORDERWORKS_AUTH_HEADER: ${ORDERWORKS_AUTH_HEADER:-X-API-Key}
      ORDERWORKS_VERIFY_SSL: ${ORDERWORKS_VERIFY_SSL:-true}
      ORDERWORKS_ALLOWED_PATHS: ${ORDERWORKS_ALLOWED_PATHS:-}
      ORDERWORKS_ALLOWED_METHODS: ${ORDERWORKS_ALLOWED_METHODS:-}
      STOCKWORKS_BASE_URL: ${STOCKWORKS_BASE_URL:-}
      STOCKWORKS_API_KEY: ${STOCKWORKS_API_KEY:-}
      STOCKWORKS_BEARER_TOKEN: ${STOCKWORKS_BEARER_TOKEN:-}
      STOCKWORKS_AUTH_HEADER: ${STOCKWORKS_AUTH_HEADER:-X-API-Key}
      STOCKWORKS_VERIFY_SSL: ${STOCKWORKS_VERIFY_SSL:-true}
      STOCKWORKS_ALLOWED_PATHS: ${STOCKWORKS_ALLOWED_PATHS:-}
      STOCKWORKS_ALLOWED_METHODS: ${STOCKWORKS_ALLOWED_METHODS:-}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ./data:/data
