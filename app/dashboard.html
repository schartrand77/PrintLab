<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#cfe2f7">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="PrintLab">
  <link rel="icon" type="image/png" href="/static/icons/icon-192.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
  <title>PrintLab</title>
  <style>
    :root {
      --bg: #dfeaf8;
      --bg-2: #c7ddf5;
      --card: rgba(255, 255, 255, 0.44);
      --card-edge: rgba(255, 255, 255, 0.62);
      --panel: rgba(255, 255, 255, 0.36);
      --line: rgba(96, 134, 176, 0.2);
      --text: #1f2c3b;
      --muted: #5f7389;
      --ok: #56ce8a;
      --amber: #ffba45;
      --red: #ff645a;
      --btn: rgba(255, 255, 255, 0.5);
      --glass-shadow: 0 10px 30px rgba(48, 90, 135, 0.2);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(1200px 650px at 8% -18%, rgba(255, 255, 255, 0.9), transparent 56%),
        radial-gradient(1100px 700px at 115% 115%, rgba(179, 210, 244, 0.7), transparent 58%),
        linear-gradient(150deg, var(--bg), var(--bg-2));
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      min-height: 100vh;
    }
    main {
      max-width: 980px;
      margin: 20px auto;
      padding: 0 14px 18px;
      display: grid;
      gap: 14px;
    }
    .card {
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.5), rgba(238, 247, 255, 0.34));
      border: 1px solid var(--card-edge);
      border-radius: 18px;
      padding: 14px;
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(18px) saturate(130%);
      -webkit-backdrop-filter: blur(18px) saturate(130%);
    }
    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 8px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: #2a4f73;
      border: 1px solid rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.54);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 13px;
      font-weight: 700;
    }
    .back-link:hover { filter: brightness(1.03); }
    .top-actions { display: inline-flex; gap: 8px; align-items: center; }
    .install-btn {
      border: 1px solid rgba(255,255,255,.7);
      background: rgba(255,255,255,.54);
      color: #2a4f73;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .install-btn[hidden] { display: none !important; }

    .print-top {
      display: grid;
      grid-template-columns: 1fr 90px;
      gap: 10px;
    }
    .camera-pane {
      min-height: 184px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.62);
      background: linear-gradient(170deg, rgba(250, 253, 255, 0.42), rgba(221, 236, 251, 0.4));
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .camera-pane img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 8px 10px rgba(0,0,0,.45));
    }
    .cam-toggle {
      position: absolute;
      left: 10px;
      top: 10px;
      z-index: 2;
      display: inline-flex;
      gap: 4px;
      background: rgba(255, 255, 255, .5);
      border: 1px solid rgba(255, 255, 255, .66);
      border-radius: 999px;
      padding: 4px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .cam-toggle button {
      border: 0;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      color: #4c6177;
      background: transparent;
      cursor: pointer;
    }
    .cam-toggle button.active {
      background: linear-gradient(145deg, #2fa5ff, #1f84ea);
      color: #fff;
    }
    .live-badge {
      position: absolute;
      right: 10px;
      top: 10px;
      z-index: 2;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, .66);
      background: rgba(255, 255, 255, .5);
      color: #486078;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 9px;
      display: none;
    }
    .live-badge.ok {
      color: #8ee39f;
      border-color: #2d6f3c;
    }
    .live-badge.err {
      color: #ff9d96;
      border-color: #81403b;
    }

    .right-rail {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.64);
      border-radius: 10px;
      padding: 7px 8px;
      display: grid;
      align-content: start;
      gap: 7px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .rail-item {
      border-bottom: 1px solid rgba(98, 139, 180, 0.18);
      padding-bottom: 6px;
    }
    .rail-item:last-child { border-bottom: 0; padding-bottom: 0; }
    .rk {
      color: #5f7590;
      opacity: .72;
      font-size: 12px;
      line-height: 1;
    }
    .rv {
      margin-top: 3px;
      font-size: 24px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -.5px;
    }
    .rv.small {
      font-size: 22px;
    }

    .prog {
      margin-top: 12px;
    }
    .bar {
      height: 4px;
      background: rgba(166, 197, 230, 0.22);
      border-radius: 999px;
      overflow: hidden;
    }
    .fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #36bcff, #5ad893);
    }
    .prog-meta {
      margin-top: 5px;
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 18px;
      font-weight: 500;
      line-height: 1;
    }
    .prog-meta small {
      font-size: 16px;
      color: #748ca3;
      opacity: .85;
    }

    .actions {
      margin-top: 11px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 5px;
    }
    .actions-wrap {
      margin-top: 11px;
      position: relative;
    }
    .actions-wrap .actions {
      margin-top: 0;
    }
    .control-error-overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: rgba(25, 40, 57, 0.76);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      z-index: 8;
      padding: 8px;
    }
    .control-error-overlay.open { display: flex; }
    .control-error-panel {
      width: 100%;
      border-radius: 10px;
      border: 1px solid rgba(255, 145, 133, 0.78);
      background: linear-gradient(155deg, rgba(255, 244, 242, 0.95), rgba(255, 229, 224, 0.92));
      color: #5d1f18;
      padding: 9px 10px;
      display: grid;
      gap: 7px;
      box-shadow: 0 10px 24px rgba(24, 20, 19, 0.35);
    }
    .control-error-title {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .2px;
      text-transform: uppercase;
    }
    .control-error-msg {
      font-size: 12px;
      line-height: 1.3;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .control-error-actions {
      display: flex;
      justify-content: flex-end;
    }
    .control-error-clear {
      border: 1px solid rgba(115, 42, 35, 0.35);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.82);
      color: #5d1f18;
      font-size: 12px;
      font-weight: 700;
      padding: 5px 9px;
      cursor: pointer;
    }
    .btn {
      border: 0;
      border-radius: 10px;
      border: 1px solid rgba(168, 206, 242, 0.24);
      height: 44px;
      background: linear-gradient(150deg, rgba(255, 255, 255, 0.68), rgba(231, 241, 251, 0.5));
      color: #203145;
      font-size: 20px;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }
    .btn[hidden] { display: none !important; }
    .btn:hover { filter: brightness(1.08); }
    .btn.yellow { background: linear-gradient(145deg, #ffc458, #ee9d2e); }
    .btn.red { background: linear-gradient(145deg, #ff7c73, #f14f45); }
    .btn.cyan { background: linear-gradient(145deg, #4ac8ff, #278fce); }

    .meta {
      margin-top: 9px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .chip {
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.62);
      background: rgba(255, 255, 255, 0.42);
      color: #304458;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 600;
    }
    .errors {
      margin-top: 9px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.62);
      background: rgba(255, 255, 255, 0.36);
      color: #334b62;
      min-height: 40px;
      font-size: 12px;
      padding: 8px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .58);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 12px;
    }
    .modal.open { display: flex; }
    .modal-panel {
      width: min(980px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: linear-gradient(160deg, rgba(238, 248, 255, 0.9), rgba(222, 237, 251, 0.86));
      border: 1px solid rgba(255, 255, 255, 0.66);
      border-radius: 12px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, .5);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid #343a43;
      position: sticky;
      top: 0;
      background: rgba(241, 249, 255, 0.86);
      z-index: 1;
    }
    .modal-title {
      font-size: 28px;
      font-weight: 600;
      color: #227ecf;
    }
    .close {
      border: 0;
      background: transparent;
      color: #41586f;
      font-size: 42px;
      line-height: 1;
      cursor: pointer;
    }
    .modal-tools {
      padding: 12px 14px;
      border-bottom: 1px solid #343a43;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .search {
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 6px;
      color: #284158;
      padding: 8px 10px;
      min-width: 260px;
      font-size: 16px;
    }
    .model-grid {
      padding: 12px 14px 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(245px, 1fr));
      gap: 10px;
    }
    .model-card {
      border: 1px solid rgba(255, 255, 255, 0.64);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.38);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .model-preview {
      height: 175px;
      background: linear-gradient(160deg, rgba(245, 251, 255, 0.65), rgba(216, 233, 248, 0.58));
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .model-preview img {
      max-width: 92%;
      max-height: 92%;
      object-fit: contain;
    }
    .model-body {
      padding: 9px;
      display: grid;
      gap: 4px;
    }
    .model-name {
      font-size: 20px;
      line-height: 1.1;
      font-weight: 700;
      word-break: break-word;
    }
    .model-meta {
      font-size: 13px;
      color: #607a93;
    }
    .print-btn {
      margin-top: 4px;
      border: 0;
      border-radius: 5px;
      background: linear-gradient(145deg, #49c8ff, #248fcd);
      color: #fff;
      height: 38px;
      font-size: 15px;
      font-weight: 600;
      cursor: not-allowed;
      opacity: .75;
    }

    .ams-wrap {
      min-height: 255px;
      border-radius: 11px;
      border: 1px solid rgba(255, 255, 255, 0.66);
      background: linear-gradient(165deg, rgba(255, 255, 255, 0.46) 0%, rgba(223, 238, 252, 0.42) 100%);
      padding: 12px;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(18px) saturate(130%);
      -webkit-backdrop-filter: blur(18px) saturate(130%);
    }
    .ams-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .ams-title {
      font-size: 14px;
      font-weight: 700;
      color: #2a4056;
    }
    .ams-chip {
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.5);
      color: #2a4056;
      font-weight: 700;
      font-size: 14px;
      padding: 6px 12px;
      border: 1px solid rgba(255, 255, 255, 0.64);
    }
    .ams-units {
      display: grid;
      gap: 10px;
    }
    .ams-unit-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .ams-unit-meta {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .ams-body {
      height: 184px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.58);
      background:
        linear-gradient(180deg, rgba(255,255,255,.32), rgba(214,231,248,.35)),
        repeating-linear-gradient(90deg, rgba(255,255,255,.25) 0 1px, transparent 1px 8px),
        linear-gradient(180deg, rgba(236,247,255,0.62) 0%, rgba(206,225,242,0.62) 100%);
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      padding: 10px;
      align-items: end;
    }
    .slot {
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.6);
      background: linear-gradient(180deg, rgba(255,255,255,.36), rgba(213,231,248,.38));
      height: 156px;
      display: grid;
      align-content: end;
      justify-items: center;
      padding: 8px 5px;
      gap: 8px;
      position: relative;
    }
    .slot::before {
      content: "";
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      height: 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .45);
    }
    .dot {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(234, 245, 255, .95);
      border: 2px solid rgba(133, 169, 206, 0.5);
    }
    .slot.active .dot {
      border-color: #3ac4ff;
      box-shadow: 0 0 0 2px rgba(0,181,255,.2) inset;
    }
    .fil {
      padding: 8px 11px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.64);
      background: rgba(255, 255, 255, 0.56);
      font-size: 15px;
      font-weight: 700;
      line-height: 1;
    }
    .rem {
      margin-top: -3px;
      font-size: 12px;
      font-weight: 700;
      color: #5c7390;
      text-align: center;
    }

    @media (max-width: 560px) {
      .print-top { grid-template-columns: 1fr; }
      .right-rail { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .rail-item { border-bottom: 0; border-right: 1px solid #444a54; padding-right: 8px; }
      .rail-item:nth-child(2n) { border-right: 0; }
      .actions { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .btn { height: 42px; font-size: 18px; }
      .ams-body { grid-template-columns: repeat(2, minmax(0, 1fr)); height: auto; }
      .slot { height: 132px; }
      .fil { font-size: 13px; }
      .search { min-width: 100%; }
      .model-name { font-size: 17px; }
      .model-meta { font-size: 12px; }
      .print-btn { font-size: 14px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <div class="top-nav">
        <a class="back-link" href="/">&#8592; Printers</a>
        <div class="top-actions">
          <button id="installBtn" class="install-btn" type="button" hidden>Install App</button>
        </div>
      </div>
      <div class="print-top">
        <div>
          <div class="camera-pane">
            <div class="cam-toggle">
              <button id="modePhoto" class="active" type="button" onclick="setViewMode('photo')">Photo</button>
              <button id="modeLive" type="button" onclick="setViewMode('live')">Live</button>
            </div>
            <div id="liveBadge" class="live-badge">LIVE</div>
            <img id="previewImage" src="/data/cache/prints/20906356-figurine_plate_2.gcode.png" alt="preview">
          </div>
          <div class="prog">
            <div class="bar"><div id="progressFill" class="fill"></div></div>
            <div class="prog-meta">
              <span id="layerInfo">0%</span>
              <small id="timeInfo">idle</small>
            </div>
          </div>
        </div>
        <aside class="right-rail">
          <div class="rail-item"><div class="rk">Nozzle</div><div id="nozzle" class="rv">-</div></div>
          <div class="rail-item"><div class="rk">Bed</div><div id="bed" class="rv small">-</div></div>
          <div class="rail-item"><div class="rk">Progress</div><div id="progValue" class="rv small">-</div></div>
          <div class="rail-item"><div class="rk">Chamber</div><div id="chamber" class="rv small">-</div></div>
        </aside>
      </div>

      <div class="actions-wrap">
        <div class="actions">
          <button class="btn yellow" title="Light On" onclick="post('/api/actions/chamber-light',{on:true})">&#128161;</button>
          <button class="btn cyan" title="SD Models" onclick="openModelsModal()">&#9776;</button>
          <button id="pauseBtn" class="btn" title="Pause" onclick="post('/api/actions/pause')">&#10074;&#10074;</button>
          <button class="btn red" title="Stop" onclick="post('/api/actions/stop')">&#9632;</button>
          <button id="resumeBtn" class="btn" title="Resume" onclick="post('/api/actions/resume')" hidden>&#9654;</button>
        </div>
        <div id="controlErrorOverlay" class="control-error-overlay" aria-live="polite">
          <div class="control-error-panel">
            <div class="control-error-title">Print Error Requires Acknowledgement</div>
            <div id="controlErrorMessage" class="control-error-msg">A print error was detected.</div>
            <div class="control-error-actions">
              <button class="control-error-clear" type="button" onclick="clearPrintErrorGate()">Clear To Continue</button>
            </div>
          </div>
        </div>
      </div>
      <div class="meta">
        <span class="chip">Remaining: <span id="remainingTime">-</span></span>
      </div>

      <div class="meta">
        <span class="chip">Serial: <span id="serial">-</span></span>
        <span class="chip">Model: <span id="model">-</span></span>
        <span class="chip">IP: <span id="ip">-</span></span>
        <span class="chip">State: <span id="state">-</span></span>
      </div>
      <div id="errors" class="errors">-</div>
    </section>

    <section class="card">
      <div class="ams-wrap">
        <div class="ams-top">
          <div class="ams-title">AMS Units: <span id="amsCount">0</span></div>
          <div class="ams-chip">Active AMS: <span id="activeAms">-</span></div>
        </div>
        <div id="amsUnits" class="ams-units"></div>
      </div>
    </section>
  </main>
  <div id="modelsModal" class="modal" onclick="onModalBackdrop(event)">
    <div class="modal-panel">
      <div class="modal-head">
        <div class="modal-title">SD Card Models</div>
        <button class="close" title="Close" onclick="closeModelsModal()">&times;</button>
      </div>
      <div class="modal-tools">
        <button class="btn" style="height:36px;font-size:16px;padding:0 12px" onclick="loadSdModels()">Refresh</button>
        <input id="modelSearch" class="search" type="text" placeholder="Search by filename..." oninput="debouncedLoadModels()">
        <div class="chip">Total: <span id="modelCount">0</span></div>
      </div>
      <div id="modelsGrid" class="model-grid"></div>
    </div>
  </div>

  <script>
    const PRINTER_ID = window.PRINTER_ID || "printer-1";
    const API_BASE = `/api/printers/${encodeURIComponent(PRINTER_ID)}`;
    function apiPath(path) {
      if (!path) return API_BASE;
      if (path.startsWith("http://") || path.startsWith("https://")) return path;
      if (path.startsWith(API_BASE)) return path;
      if (path.startsWith("/api/")) return `${API_BASE}${path.slice(4)}`;
      return `${API_BASE}${path.startsWith("/") ? path : `/${path}`}`;
    }
    if (window.PRINTER_NAME) {
      document.title = `PrintLab - ${window.PRINTER_NAME}`;
    }

    let viewMode = "photo";
    let modelSearchTimer = null;
    let swRegistration = null;
    let deferredInstallPrompt = null;
    let printerEventSource = null;
    let printerEventRetryTimer = null;
    const notifyEnabledShownKey = "printlab.notify.enabled.v1";
    const notifyState = {
      connected: null,
      jobState: null,
      errorSig: null,
      lastPrinterEvent: null
    };
    const printErrorGate = {
      active: false,
      signature: null,
      acknowledgedSignature: null
    };
    const photoSrc = "/data/cache/prints/20906356-figurine_plate_2.gcode.png";
    const placeholderThumb =
      "data:image/svg+xml;utf8," +
      encodeURIComponent("<svg xmlns='http://www.w3.org/2000/svg' width='640' height='480'><rect width='100%' height='100%' fill='#33373d'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='#9aa2ad' font-family='Segoe UI' font-size='24'>No Thumbnail</text></svg>");
    const liveUnavailableThumb =
      "data:image/svg+xml;utf8," +
      encodeURIComponent("<svg xmlns='http://www.w3.org/2000/svg' width='640' height='480'><rect width='100%' height='100%' fill='#2f343b'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='#c2c8d0' font-family='Segoe UI' font-size='24'>Live feed unavailable</text></svg>");

    async function initPwa() {
      if (!("serviceWorker" in navigator)) return;
      try {
        swRegistration = await navigator.serviceWorker.register("/sw.js");
      } catch (_e) {
        swRegistration = null;
      }
      setupInstallPrompt();
      await ensureNativeNotifications();
    }

    function setupInstallPrompt() {
      const installBtn = document.getElementById("installBtn");
      if (!installBtn) return;

      window.addEventListener("beforeinstallprompt", (event) => {
        event.preventDefault();
        deferredInstallPrompt = event;
        installBtn.hidden = false;
        installBtn.textContent = "Install App";
      });

      installBtn.addEventListener("click", async () => {
        if (deferredInstallPrompt) {
          deferredInstallPrompt.prompt();
          await deferredInstallPrompt.userChoice.catch(() => null);
          deferredInstallPrompt = null;
          installBtn.hidden = true;
          return;
        }
        if (isIosStandaloneCandidate()) {
          installBtn.textContent = "Use Share > Add to Home Screen";
          installBtn.hidden = false;
        }
      });

      if (isIosStandaloneCandidate()) {
        installBtn.hidden = false;
        installBtn.textContent = "Add to Home Screen";
      }

      window.addEventListener("appinstalled", () => {
        installBtn.hidden = true;
        deferredInstallPrompt = null;
      });
    }

    function isIosStandaloneCandidate() {
      const ua = window.navigator.userAgent.toLowerCase();
      const isIos = /iphone|ipad|ipod/.test(ua);
      const inStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
      return isIos && !inStandalone;
    }

    async function ensureNativeNotifications() {
      if (!("Notification" in window)) return;
      const permissionBefore = Notification.permission;
      try {
        if (Notification.permission === "default") {
          await Notification.requestPermission();
        }
      } catch (_e) {}
      if (Notification.permission !== "granted") return;

      // Only send this one-time confirmation when permission is newly granted.
      if (permissionBefore !== "granted") {
        let alreadyShown = false;
        try {
          alreadyShown = localStorage.getItem(notifyEnabledShownKey) === "1";
        } catch (_e) {}
        if (!alreadyShown) {
          await sendNativeNotification("PrintLab", "Native notifications enabled.", "printlab-enabled");
          try {
            localStorage.setItem(notifyEnabledShownKey, "1");
          } catch (_e) {}
        }
      }
    }

    async function sendNativeNotification(title, body, tag) {
      if (!("Notification" in window) || Notification.permission !== "granted") return;
      const opts = {
        body,
        tag,
        icon: "/static/icons/icon-192.png",
        badge: "/static/icons/icon-192.png",
        data: { url: "/" },
        renotify: false,
        vibrate: [80, 30, 80]
      };
      try {
        if (swRegistration && swRegistration.showNotification) {
          await swRegistration.showNotification(title, opts);
        } else {
          new Notification(title, opts);
        }
      } catch (_e) {}
    }

    function handlePrinterEvent(payload) {
      const eventName = (payload?.event || "").toString().toLowerCase();
      if (!eventName || eventName === notifyState.lastPrinterEvent) return;
      notifyState.lastPrinterEvent = eventName;

      // These are direct printer callback events and should notify immediately.
      if (eventName.includes("disconnect")) {
        sendNativeNotification("Printer Disconnected", "Printer connection dropped.", "printer-disconnected-event");
      } else if (eventName.includes("resume")) {
        sendNativeNotification("Print Resumed", "The print job resumed.", "print-resumed-event");
      } else if (eventName.includes("pause")) {
        sendNativeNotification("Print Paused", "The print job paused.", "print-paused-event");
      } else if (eventName.includes("stop")) {
        sendNativeNotification("Print Stopped", "The print job was stopped.", "print-stopped-event");
      } else if (eventName.includes("error")) {
        sendNativeNotification("Printer Event Error", `Event: ${eventName}`, "printer-event-error");
      }

      // Pull fresh state immediately after any printer event.
      load();
    }

    function connectPrinterEvents() {
      if (!("EventSource" in window)) return;
      if (printerEventSource) {
        printerEventSource.close();
        printerEventSource = null;
      }
      printerEventSource = new EventSource(apiPath("/api/events"));
      printerEventSource.addEventListener("printer", (evt) => {
        try {
          const payload = JSON.parse(evt.data || "{}");
          handlePrinterEvent(payload);
        } catch (_e) {}
      });
      printerEventSource.onerror = () => {
        if (printerEventSource) {
          printerEventSource.close();
          printerEventSource = null;
        }
        if (printerEventRetryTimer) clearTimeout(printerEventRetryTimer);
        printerEventRetryTimer = setTimeout(connectPrinterEvents, 3000);
      };
    }

    function normalizeErrorMessage(rawError) {
      if (!rawError) return "";
      if (typeof rawError === "string") {
        const trimmed = rawError.trim();
        return trimmed === "-" ? "" : trimmed;
      }
      try {
        const asJson = JSON.stringify(rawError, null, 2);
        return asJson === "{}" ? "" : asJson;
      } catch (_e) {
        return String(rawError || "");
      }
    }

    function setPrintErrorGate(rawError) {
      const message = normalizeErrorMessage(rawError);
      if (!message) {
        printErrorGate.active = false;
        printErrorGate.signature = null;
        renderPrintErrorOverlay();
        return;
      }

      const signature = message;
      if (printErrorGate.acknowledgedSignature === signature) {
        printErrorGate.active = false;
        printErrorGate.signature = signature;
        renderPrintErrorOverlay();
        return;
      }

      printErrorGate.active = true;
      printErrorGate.signature = signature;
      renderPrintErrorOverlay();
    }

    function clearPrintErrorGate() {
      if (!printErrorGate.signature) return;
      printErrorGate.acknowledgedSignature = printErrorGate.signature;
      printErrorGate.active = false;
      renderPrintErrorOverlay();
      updateActionButtons(window.__lastJobState, window.__lastConnected);
    }

    function renderPrintErrorOverlay() {
      const overlay = document.getElementById("controlErrorOverlay");
      const messageEl = document.getElementById("controlErrorMessage");
      if (!overlay || !messageEl) return;
      if (!printErrorGate.active || !printErrorGate.signature) {
        overlay.classList.remove("open");
        return;
      }
      messageEl.textContent =
        `${printErrorGate.signature}\n\nClear this alert before resuming the print.`;
      overlay.classList.add("open");
    }

    async function post(url, body) {
      if (printErrorGate.active && String(url || "").includes("/api/actions/resume")) {
        const errors = document.getElementById("errors");
        if (errors) {
          errors.textContent = "Resume blocked: clear the print error overlay first.";
        }
        return;
      }
      try {
        const res = await fetch(apiPath(url), {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: body ? JSON.stringify(body) : null
        });
        if (!res.ok) {
          let msg = `HTTP ${res.status}`;
          try {
            const payload = await res.json();
            if (payload?.detail) msg = String(payload.detail);
          } catch (_e) {}
          throw new Error(msg);
        }
        await load();
      } catch (err) {
        const errors = document.getElementById("errors");
        if (errors) {
          errors.textContent = `Action failed: ${String(err?.message || err)}`;
        }
      }
    }

    function updateActionButtons(jobStateRaw, connected) {
      const pauseBtn = document.getElementById("pauseBtn");
      const resumeBtn = document.getElementById("resumeBtn");
      if (!pauseBtn || !resumeBtn) return;

      const state = String(jobStateRaw || "").toUpperCase();
      const isPaused = state.includes("PAUSE");
      const canControl = !!connected;
      const resumeBlockedByError = printErrorGate.active;

      pauseBtn.hidden = isPaused;
      resumeBtn.hidden = !isPaused;
      pauseBtn.disabled = !canControl || isPaused;
      resumeBtn.disabled = !canControl || !isPaused || resumeBlockedByError;
    }

    function setViewMode(mode) {
      viewMode = mode;
      document.getElementById("modePhoto").classList.toggle("active", mode === "photo");
      document.getElementById("modeLive").classList.toggle("active", mode === "live");
      if (mode === "live") {
        startLiveFeed();
      } else {
        stopLiveFeed();
        setLiveBadge("", "");
        const img = document.getElementById("previewImage");
        img.onerror = () => { img.src = placeholderThumb; };
        img.src = photoSrc;
      }
    }

    function setLiveBadge(text, stateClass) {
      const badge = document.getElementById("liveBadge");
      badge.classList.remove("ok", "err");
      if (!text) {
        badge.style.display = "none";
        badge.textContent = "";
        return;
      }
      badge.textContent = text;
      if (stateClass) badge.classList.add(stateClass);
      badge.style.display = "inline-block";
    }

    function startLiveFeed() {
      stopLiveFeed();
      const img = document.getElementById("previewImage");
      let started = false;
      img.onload = () => {
        started = true;
        setLiveBadge("LIVE", "ok");
      };
      img.onerror = () => {
        setLiveBadge("NO SIGNAL", "err");
        if (!started) img.src = liveUnavailableThumb;
      };
      img.src = `${apiPath("/api/live/stream.mjpg")}?t=${Date.now()}`;
    }

    function stopLiveFeed() {
      const img = document.getElementById("previewImage");
      img.onload = null;
      img.onerror = null;
      img.src = "";
    }

    function formatBytes(bytes) {
      if (!Number.isFinite(bytes)) return "-";
      const units = ["B", "KB", "MB", "GB"];
      let value = bytes;
      let i = 0;
      while (value >= 1024 && i < units.length - 1) {
        value /= 1024;
        i++;
      }
      return `${value.toFixed(value >= 100 || i === 0 ? 0 : 1)} ${units[i]}`;
    }

    function formatDate(iso) {
      if (!iso) return "-";
      const dt = new Date(iso);
      if (Number.isNaN(dt.getTime())) return "-";
      return dt.toLocaleDateString();
    }

    function openModelsModal() {
      document.getElementById("modelsModal").classList.add("open");
      loadSdModels();
    }

    function closeModelsModal() {
      document.getElementById("modelsModal").classList.remove("open");
    }

    function onModalBackdrop(evt) {
      if (evt.target.id === "modelsModal") {
        closeModelsModal();
      }
    }

    function debouncedLoadModels() {
      if (modelSearchTimer) clearTimeout(modelSearchTimer);
      modelSearchTimer = setTimeout(() => loadSdModels(), 260);
    }

    async function loadSdModels() {
      const grid = document.getElementById("modelsGrid");
      const count = document.getElementById("modelCount");
      const q = (document.getElementById("modelSearch").value || "").trim();
      grid.innerHTML = "<div class='model-meta'>Loading...</div>";
      try {
        const res = await fetch(`${apiPath("/api/sd/models")}?query=${encodeURIComponent(q)}`);
        const data = await res.json();
        const items = data.items || [];
        count.textContent = String(items.length);
        if (!items.length) {
          grid.innerHTML = "<div class='model-meta'>No models found on SD card.</div>";
          return;
        }

        grid.innerHTML = items.map(item => `
          <article class="model-card">
            <div class="model-preview">
              <img src="${item.thumbnail_url || placeholderThumb}" alt="model preview" onerror="this.onerror=null;this.src='${placeholderThumb}'">
            </div>
            <div class="model-body">
              <div class="model-name">${item.name}</div>
              <div class="model-meta">${formatBytes(item.size_bytes)} - ${formatDate(item.modified)}</div>
              <div class="model-meta">${item.path}</div>
              <button class="print-btn" title="Coming soon">Print Again</button>
            </div>
          </article>
        `).join("");
      } catch (e) {
        grid.innerHTML = "<div class='model-meta'>Failed to load SD card models.</div>";
      }
    }

    function temp(v) {
      if (v === null || v === undefined || Number.isNaN(v)) return "-";
      return `${v} C`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderAms(amsState) {
      const unitsEl = document.getElementById("amsUnits");
      const countEl = document.getElementById("amsCount");
      const activeAmsEl = document.getElementById("activeAms");
      const units = Array.isArray(amsState?.ams_units) && amsState.ams_units.length
        ? amsState.ams_units
        : [{ ams_index: 0, humidity_pct: null, temperature_c: null, slots: Array.isArray(amsState?.slots) ? amsState.slots : [] }];

      countEl.textContent = String(amsState?.total_ams_count ?? units.length ?? 0);
      const activeAms = amsState?.active_ams_index;
      activeAmsEl.textContent = activeAms === null || activeAms === undefined ? "-" : `AMS ${Number(activeAms) + 1}`;

      const html = units.map((unit) => {
        const unitSlots = Array.isArray(unit?.slots) && unit.slots.length ? unit.slots : [
          { index: 0, type: "Empty", empty: true },
          { index: 1, type: "Empty", empty: true },
          { index: 2, type: "Empty", empty: true },
          { index: 3, type: "Empty", empty: true }
        ];
        const humidity = Number(unit?.humidity_pct);
        const temperature = Number(unit?.temperature_c);
        const unitLabel = Number(unit?.ams_index);
        const unitName = Number.isFinite(unitLabel) ? `AMS ${unitLabel + 1}` : "AMS";
        const slotsHtml = unitSlots.map((slot) => {
          const isActive = !!slot?.active;
          const isEmpty = slot?.empty !== false;
          const label = (slot?.type || "").trim() || (isEmpty ? "Empty" : "-");
          const color = slot?.color_hex || "#2f343c";
          const remain = Number(slot?.remain_percent);
          const remainText = Number.isFinite(remain) && remain >= 0 ? `${Math.round(remain)}% left` : "-";
          return `<div class="slot ${isActive ? "active" : ""}">
            <div class="dot" style="background:${escapeHtml(color)};border-color:${isEmpty ? "#525a66" : escapeHtml(color)}"></div>
            <div class="fil" style="opacity:${isEmpty ? "0.7" : "1"}">${escapeHtml(label)}</div>
            <div class="rem" style="opacity:${isEmpty ? "0.7" : "1"}">${escapeHtml(remainText)}</div>
          </div>`;
        }).join("");
        return `<section class="ams-unit">
          <div class="ams-unit-head">
            <div class="ams-chip">${escapeHtml(unitName)}</div>
            <div class="ams-unit-meta">
              <div class="ams-chip">&#128167; ${Number.isFinite(humidity) ? Math.round(humidity) + "%" : "-"}</div>
              <div class="ams-chip">&#127777; ${Number.isFinite(temperature) ? Math.round(temperature) + " C" : "-"}</div>
            </div>
          </div>
          <div class="ams-body">${slotsHtml}</div>
        </section>`;
      }).join("");
      unitsEl.innerHTML = html;
    }

    function formatRemainingMinutes(value) {
      const minutes = Number(value);
      if (!Number.isFinite(minutes) || minutes < 0) return "-";
      if (minutes < 1) return "<1m";
      const rounded = Math.round(minutes);
      const hours = Math.floor(rounded / 60);
      const mins = rounded % 60;
      if (hours <= 0) return `${mins}m`;
      if (mins === 0) return `${hours}h`;
      return `${hours}h ${mins}m`;
    }

    async function load() {
      const r = await fetch(apiPath("/api/state"));
      const s = await r.json();
      const progress = Number(s.job?.progress_percent ?? 0);
      const layer = s.job?.current_layer ?? 0;
      const total = s.job?.total_layers ?? 0;

      document.getElementById("progressFill").style.width = `${Math.max(0, Math.min(100, progress))}%`;
      document.getElementById("layerInfo").textContent = `${layer}/${total || "?"}`;
      document.getElementById("timeInfo").textContent = s.job?.state ?? "idle";

      document.getElementById("nozzle").textContent = temp(s.temperatures?.nozzle_current);
      document.getElementById("bed").textContent = temp(s.temperatures?.bed_current);
      document.getElementById("chamber").textContent = temp(s.temperatures?.chamber);
      document.getElementById("progValue").textContent = `${progress}%`;

      document.getElementById("serial").textContent = s.printer?.serial ?? "-";
      document.getElementById("model").textContent = s.printer?.device_type ?? "-";
      document.getElementById("ip").textContent = s.printer?.ip_address ?? "-";
      document.getElementById("state").textContent = s.connected ? "Connected" : "Disconnected";
      document.getElementById("remainingTime").textContent = formatRemainingMinutes(s.job?.remaining_minutes);
      window.__lastJobState = s.job?.state;
      window.__lastConnected = s.connected;
      setPrintErrorGate(s.errors?.print_error);
      updateActionButtons(s.job?.state, s.connected);
      if (viewMode === "photo") {
        const img = document.getElementById("previewImage");
        img.onerror = () => { img.src = placeholderThumb; };
        img.src = photoSrc;
      }

      const err = s.errors?.print_error || (s.errors?.hms?.Count ? s.errors.hms : null) || s.last_error || "-";
      document.getElementById("errors").textContent = typeof err === "string" ? err : JSON.stringify(err, null, 2);
      renderAms(s.ams);

      const jobStateRaw = (s.job?.state || "").toString();
      const jobState = jobStateRaw.toUpperCase();
      const errorSig = typeof err === "string" ? err : JSON.stringify(err);

      if (notifyState.connected === true && !s.connected) {
        sendNativeNotification("Printer Disconnected", "PrintLab lost connection to the printer.", "printer-disconnected");
      }
      if (notifyState.jobState && notifyState.jobState !== jobState) {
        if (jobState.includes("FINISH") || jobState.includes("COMPLETE")) {
          sendNativeNotification("Print Complete", "Your print has finished.", "print-finished");
        } else if (jobState.includes("PAUSE")) {
          sendNativeNotification("Print Paused", "The print job is paused.", "print-paused");
        } else if (jobState.includes("FAIL")) {
          sendNativeNotification("Print Failed", "The print job reported a failure.", "print-failed");
        }
      }
      if (errorSig && errorSig !== "-" && errorSig !== notifyState.errorSig) {
        sendNativeNotification("Printer Alert", `${String(errorSig).slice(0, 140)}`, "printer-error");
      }

      notifyState.connected = !!s.connected;
      notifyState.jobState = jobState;
      notifyState.errorSig = errorSig;
    }

    initPwa();
    connectPrinterEvents();
    load();
    setInterval(load, 3000);
  </script>
</body>
</html>
